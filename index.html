<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anwar Ahmed Mahanan Yahya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --gold: #b8966a;
      --gold-light: #d4b48a;
      --white: #f0ece4;
      --muted: #6a6460;
      --line: #1e1c1a;
    }
    html, body { height: 100%; background: var(--bg); color: var(--white); font-family: Montserrat, sans-serif; font-weight: 300; overflow: hidden; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
      z-index: 10;
    }
    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 700px;
      background: radial-gradient(ellipse at center, rgba(184,150,106,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }
    .rule-top { position: fixed; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0; animation: fadeIn 2s ease 0.5s forwards; }
    .corner { position: fixed; width: 20px; height: 20px; opacity: 0; animation: fadeIn 2s ease 0.8s forwards; }
    .corner-tl { top: 24px; left: 24px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner-tr { top: 24px; right: 24px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .corner-bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner-br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .location { font-family: Montserrat, sans-serif; font-size: 9px; font-weight: 400; letter-spacing: 0.35em; text-transform: uppercase; color: var(--muted); margin-bottom: 52px; opacity: 0; animation: slideUp 1.2s ease 0.4s forwards; }
    .name { font-family: 'Cormorant Garamond', serif; font-size: clamp(32px, 5vw, 58px); font-weight: 300; letter-spacing: 0.12em; text-transform: uppercase; color: var(--white); line-height: 1.1; opacity: 0; animation: slideUp 1.4s ease 0.6s forwards; }
    .divider { display: flex; align-items: center; gap: 16px; margin: 32px auto; width: 200px; opacity: 0; animation: fadeIn 1.2s ease 1.0s forwards; }
    .divider-line { flex: 1; height: 1px; background: var(--gold); opacity: 0.4; }
    .divider-diamond { width: 5px; height: 5px; background: var(--gold); transform: rotate(45deg); opacity: 0.8; }
    .tagline { font-family: 'Cormorant Garamond', serif; font-size: clamp(14px, 1.8vw, 18px); font-weight: 300; font-style: italic; color: var(--gold-light); letter-spacing: 0.08em; opacity: 0; animation: slideUp 1.2s ease 1.1s forwards; line-height: 1.8; }
    .email-wrap { margin-top: 52px; opacity: 0; animation: slideUp 1.2s ease 1.4s forwards; }
    .email { font-family: Montserrat, sans-serif; font-size: 11px; font-weight: 300; letter-spacing: 0.28em; text-transform: lowercase; color: var(--muted); text-decoration: none; transition: color 0.4s ease; position: relative; }
    .email::after { content: ''; position: absolute; bottom: -3px; left: 0; right: 0; height: 1px; background: var(--gold); transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease; }
    .email:hover { color: var(--gold-light); }
    .email:hover::after { transform: scaleX(1); }
    .coordinates { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); font-size: 9px; letter-spacing: 0.3em; color: var(--line); text-transform: uppercase; opacity: 0; animation: fadeIn 2s ease 2s forwards; }
    .linkedin { position: fixed; bottom: 32px; right: 40px; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); text-decoration: none; opacity: 0; animation: fadeIn 2s ease 1.8s forwards; transition: color 0.3s ease; }
    .linkedin:hover { color: var(--gold); }
    .enter-link { display: block; margin-top: 48px; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); text-decoration: none; opacity: 0; animation: fadeIn 2s ease 1.6s forwards; transition: color 0.3s; }
    .enter-link:hover { color: var(--gold-light); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) { .name { font-size: 28px; letter-spacing: 0.08em; } .tagline { font-size: 14px; } .corner { display: none; } }
  </style>
</head>
<body>
  <div class="rule-top"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="container">
    <p class="location">Oxford &nbsp;&nbsp; Geneva &nbsp;&nbsp; Madrid &nbsp;&nbsp; Casablanca</p>
    <h1 class="name">Anwar Ahmed<br>Mahanan Yahya</h1>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>
    <p class="tagline">Private Equity &nbsp;&nbsp; Oxford &nbsp;&nbsp; Spain&ndash;Morocco Corridor</p>
    <div class="email-wrap">
      <a href="mailto:anwar@anwaryahya.com" class="email">anwar@anwaryahya.com</a>
    </div>
    <a href="portfolio.html" class="enter-link">Enter &rarr;</a>
  </div>
  <p class="coordinates">35.8916&deg; N &nbsp; 2.9642&deg; W</p>
  <a href="https://linkedin.com/in/anwar" target="_blank" class="linkedin">LinkedIn</a>
</body>
</html>
